<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso Patrullero | Vigía Rural</title>

<link rel="stylesheet" href="../css/patrullero-login.css">

</head>

<body>

<main class="login-wrap">

<section class="card">

<h1>Ingreso Patrullero</h1>

<p class="sub">

Accedé al panel de patrullaje con tu usuario autorizado.

</p>

<form id="formLogin">

<label>Email</label>
<input id="email" type="email" required>

<label>Password</label>
<input id="password" type="password" required>

<button type="submit" id="btnLogin">
Ingresar
</button>

</form>

<p id="estado" class="estado"></p>

<div class="acciones">

<a href="./registro.html">

Registrarme como patrullero

</a>

</div>

</section>

</main>

<script type="module" src="../js/modules/patrullero/login.js"></script>

</body>
</html>
