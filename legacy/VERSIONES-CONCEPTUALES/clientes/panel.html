
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de Clientes - RED RURAL</title>
<link rel="stylesheet" href="../css/v32-clientes.css">
</head>
<body>

<h1>Gestión de Clientes</h1>

<section>
<h2>Alta de cliente</h2>
<form>
<label>Nombre del campo:</label>
<input type="text" placeholder="Ej: Estancia La Paz"><br><br>

<label>Ubicación:</label>
<input type="text" placeholder="Ej: Gualeguay"><br><br>

<label>Plan contratado:</label>
<select>
<option>Básico</option>
<option>Profesional</option>
<option>Premium</option>
</select><br><br>

<button type="button">Guardar cliente</button>
</form>
</section>

<section>
<h2>Clientes registrados</h2>
<ul id="listaClientes">
<li>Campo La Esperanza</li>
<li>Estancia Don José</li>
</ul>
</section>

</body>
</html>
