<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Red Rural — Admin Planes</title>

    <link rel="stylesheet" href="./css/app-base.css">
    <link rel="stylesheet" href="./css/app-components.css">
    <link rel="stylesheet" href="./css/app-theme.css">
    <link rel="stylesheet" href="core/css/admin.css">
    <link rel="stylesheet" href="css/app-layout.css">
    <link rel="stylesheet" href="css/app-utilities.css">
</head>

<body>
    <div class="card">
        <h1>Admin — Planes Red Rural</h1>
        <div class="muted">Gestioná el plan en <b>Firestore</b> (colección <b>productores</b>).</div>

        <hr style="border:none; border-top:1px solid #e5e7eb; margin:16px 0;">

        <div id="estado" class="badge">Estado: no logueado</div>

        <h3 style="margin:14px 0 6px;">1) Login Admin</h3>
        <div class="row">
            <input id="email" type="email" placeholder="Email admin" autocomplete="email" />
            <input id="pass" type="password" placeholder="Password" autocomplete="current-password" />
            <button id="btnLogin">Entrar</button>
            <button id="btnLogout" class="sec hide">Salir</button>
        </div>

        <h3 style="margin:18px 0 6px;">2) Gestión de Plan</h3>
        <div class="muted">
            Pegá el <b>UID</b> que te mandan por WhatsApp (desde el botón “Pasar a PRO”).
        </div>

        <div class="row" style="margin-top:10px;">
            <input id="uid" placeholder="UID del productor (desde WhatsApp)" />
            <select id="plan">
                <option value="free">FREE</option>
                <option value="pro">PRO</option>
            </select>
            <button id="btnAplicar" class="hide">Aplicar</button>
            <button id="btnBajar" class="danger hide">Volver a FREE</button>
        </div>

        <h3 style="margin:18px 0 6px;">Logs</h3>
        <pre id="log">Listo. Pegá tu Firebase config y logueate.</pre>
    </div>

    <script type="module" src="./core/js/modules/admin/admin-page.js"></script>
</body>

</html>
