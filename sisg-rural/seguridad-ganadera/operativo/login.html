<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SISG Rural - Ingreso</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sistema inteligente de análisis de incidencias, mapas de riesgo y prevención del delito rural.">

<meta property="og:title" content="SISG Rural — Inteligencia de seguridad">
<meta property="og:description" content="Análisis de riesgo, incidencias y seguridad ganadera con mapas inteligentes.">
<meta property="og:image" content="https://tudominio.com/icons/sisg-rural-og.png">
<meta property="og:url" content="https://tudominio.com/sisg-rural">
<meta property="og:site_name" content="SISG Rural">

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f766e">
<link rel="apple-touch-icon" href="./icons/sisg-192.png">

<style>

body{
  margin:0;
  font-family:system-ui, sans-serif;
 background: rgba(255, 255, 255, 0.96);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.card{
  background:#fff;
  padding:28px 26px;
  border-radius:18px;
  width:100%;
  max-width:380px;
  box-shadow:0 20px 40px rgba(0,0,0,.18);
}

h2{
  margin:0 0 12px;
  color:#0f172a;
}

.sub{
  color:#475569;
  font-size:.92rem;
  margin-bottom:18px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #d1d5db;
  margin-bottom:12px;
  font-size:.95rem;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:800;
  background:#0f766e;
  color:#fff;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-1px);
}

.muted{
  margin-top:10px;
  font-size:.85rem;
  color:#64748b;
  text-align:center;
}

.logo{
  font-size:1.6rem;
  font-weight:900;
  margin-bottom:10px;
  color:#0f766e;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">
🛡️ SISG Rural
</div>

<h2>Ingreso al sistema</h2>

<div class="sub">
Sistema inteligente de seguridad ganadera
</div>

<input id="email" type="email" placeholder="Correo electrónico">

<input id="password" type="password" placeholder="Contraseña">

<button id="btnLogin">
  Ingresar
</button>
<div id="msg" class="muted">
Esperando credenciales
</div>

</div>

<script type="module">
import { auth } from "../../../core/firebase-init.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const msg = document.getElementById("msg");
const btnLogin = document.getElementById("btnLogin");

async function login() {
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  try {
    msg.textContent = "Ingresando...";
    await signInWithEmailAndPassword(auth, email, password);
    msg.textContent = "Ingreso correcto...";
    setTimeout(() => {
      window.location.href = "panel.html";
    }, 800);
  } catch (error) {
    console.error(error);
    msg.textContent = "Credenciales incorrectas o error de acceso";
  }
}

btnLogin.addEventListener("click", login);
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js")
      .then((reg) => console.log("SW registrado:", reg.scope))
      .catch((err) => console.error("Error registrando SW:", err));
  });
}
</script>

</body>
</html>
